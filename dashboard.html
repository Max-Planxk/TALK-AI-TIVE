<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TALK-AI-TIVE — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>

    /* ══════════════════════════════════════════
       CSS VARIABLES — identical to app.html
    ══════════════════════════════════════════ */
    :root {
      --bg:        #070b14;
      --surface:   #0d1424;
      --surface-2: #111b2e;
      --border:    rgba(99,179,255,0.14);
      --blue:      #3b9eff;
      --blue-dim:  rgba(59,158,255,0.12);
      --blue-glow: rgba(59,158,255,0.35);
      --cyan:      #00e5ff;
      --text:      #e8f4ff;
      --muted:     #4d6b88;
      --muted-2:   #7a9ab8;
      --success:   #00d68f;
      --warning:   #f5a623;
      --error:     #ff4d6d;
    }

    body.light {
      --bg:        #f5ede0;
      --surface:   #fdf5eb;
      --surface-2: #f0e2cc;
      --border:    rgba(200,130,50,0.22);
      --text:      #2d1a06;
      --muted:     #a0784a;
      --muted-2:   #7a5530;
      --blue:      #d4790a;
      --blue-dim:  rgba(212,121,10,0.12);
      --blue-glow: rgba(212,121,10,0.35);
      --cyan:      #c05c00;
    }

    /* ══════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; scroll-behavior: smooth; }
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════════
       BACKGROUND
    ══════════════════════════════════════════ */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg-orbs span {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.05;
      animation: orb-drift ease-in-out infinite alternate;
    }
    .bg-orbs span:nth-child(1) { width: 480px; height: 480px; background: var(--blue);  top:-80px; right:-60px; animation-duration:16s; }
    .bg-orbs span:nth-child(2) { width: 360px; height: 360px; background: var(--cyan);  bottom:-60px; left:-40px; animation-duration:20s; animation-delay:-8s; }

    body.light .bg-orbs span:nth-child(1) { background: #e8820a; }
    body.light .bg-orbs span:nth-child(2) { background: #f5b942; }

    @keyframes orb-drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,25px) scale(1.08); }
    }

    /* ══════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════ */
    .app-wrapper { position: relative; z-index: 2; display: flex; flex-direction: column; min-height: 100vh; }

    /* ══════════════════════════════════════════
       NAVBAR  (identical to app.html)
    ══════════════════════════════════════════ */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,11,20,0.7);
      backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10;
      transition: background 0.4s, border-color 0.4s;
    }
    body.light .navbar { background: rgba(245,237,224,0.88); }

    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--blue-dim); border: 1px solid rgba(59,158,255,0.3);
      display: flex; align-items: center; justify-content: center;
    }
    body.light .nav-logo-icon { border-color: rgba(212,121,10,0.3); }
    .nav-logo-icon svg { width: 16px; height: 16px; fill: var(--blue); }
    .nav-logo-text { font-size: 16px; font-weight: 800; letter-spacing: 0.05em; color: var(--text); }
    .nav-logo-text span { color: var(--blue); }

    .nav-right { display: flex; align-items: center; gap: 12px; }

    .nav-app-link {
      font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
      color: var(--muted-2); text-decoration: none;
      padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .nav-app-link:hover { color: var(--blue); border-color: var(--blue-glow); background: var(--blue-dim); }

    .theme-toggle {
      width: 44px; height: 24px; border-radius: 99px;
      background: var(--surface-2); border: 1px solid var(--border);
      cursor: pointer; position: relative; transition: background 0.3s;
    }
    .theme-toggle::before {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--blue); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 6px var(--blue-glow);
    }
    body.light .theme-toggle::before { transform: translateX(20px); background: #f5a623; box-shadow: 0 0 6px rgba(245,166,35,0.5); }

    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      box-shadow: 0 0 12px var(--blue-glow); cursor: pointer;
    }

    /* ══════════════════════════════════════════
       PAGE HEADER
    ══════════════════════════════════════════ */
    .page-header {
      width: 100%; max-width: 900px; margin: 0 auto;
      padding: 40px 20px 0;
      animation: fade-up 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes fade-up {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .page-title {
      font-size: 28px; font-weight: 800; letter-spacing: 0.03em;
      display: flex; align-items: center; gap: 12px;
    }
    .page-title-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--blue-dim); border: 1px solid rgba(59,158,255,0.25);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .page-subtitle {
      font-family: 'Space Mono', monospace; font-size: 12px;
      color: var(--muted); letter-spacing: 0.08em; margin-top: 8px;
    }

    /* ══════════════════════════════════════════
       MAIN
    ══════════════════════════════════════════ */
    .main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 32px 20px 60px; gap: 24px;
    }

    .content-wrap { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 24px; }

    /* ══════════════════════════════════════════
       STATS ROW
    ══════════════════════════════════════════ */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      animation: fade-up 0.5s 0.05s cubic-bezier(0.22,1,0.36,1) both;
    }

    @media (max-width: 700px) { .stats-row { grid-template-columns: repeat(2,1fr); } }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 18px;
      display: flex; flex-direction: column; gap: 8px;
      transition: border-color 0.2s, transform 0.2s;
      cursor: default;
    }
    .stat-card:hover { border-color: rgba(59,158,255,0.3); transform: translateY(-2px); }
    body.light .stat-card:hover { border-color: rgba(212,121,10,0.3); }

    .stat-icon { font-size: 20px; }
    .stat-value {
      font-size: 28px; font-weight: 800; letter-spacing: -0.02em;
      color: var(--blue);
      font-family: 'Space Mono', monospace;
    }
    .stat-label {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase;
    }

    /* ══════════════════════════════════════════
       FILTER / SEARCH ROW
    ══════════════════════════════════════════ */
    .filter-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      animation: fade-up 0.5s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
      font-size: 14px;
    }
    .search-input {
      width: 100%; height: 40px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 0 12px 0 34px;
      font-family: 'Syne', sans-serif; font-size: 13px; color: var(--text);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-dim); }

    .filter-btn {
      height: 40px; padding: 0 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 0.07em; color: var(--muted-2);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--blue); color: var(--blue); background: var(--blue-dim);
    }

    .clear-all-btn {
      height: 40px; padding: 0 14px;
      background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2);
      border-radius: 10px; font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 0.07em; color: var(--error);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .clear-all-btn:hover { background: rgba(255,77,109,0.15); border-color: var(--error); }

    /* ══════════════════════════════════════════
       HISTORY LIST
    ══════════════════════════════════════════ */
    .history-section {
      display: flex; flex-direction: column; gap: 10px;
      animation: fade-up 0.5s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    .section-label {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase;
      padding-left: 2px;
    }

    /* Empty state */
    .empty-state {
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: 16px; padding: 60px 20px;
      text-align: center; display: none; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .empty-state.show { display: flex; }
    .empty-state-icon { font-size: 40px; opacity: 0.5; }
    .empty-state-title { font-size: 16px; font-weight: 700; color: var(--muted-2); }
    .empty-state-sub {
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--muted); letter-spacing: 0.06em;
    }

    /* History card */
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex; align-items: flex-start; gap: 16px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: card-in 0.35s cubic-bezier(0.22,1,0.36,1) both;
      position: relative; overflow: hidden;
    }
    @keyframes card-in {
      from { opacity:0; transform:translateX(-12px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .history-card:hover {
      border-color: rgba(59,158,255,0.25);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    body.light .history-card:hover { border-color: rgba(212,121,10,0.25); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

    /* Favorite glow strip */
    .history-card.favorited::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--warning), transparent);
      border-radius: 14px 0 0 14px;
    }

    .card-mode-badge {
      flex-shrink: 0; width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      background: var(--surface-2); border: 1px solid var(--border);
    }

    .card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }

    .card-query {
      font-size: 14px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .card-url {
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--muted); white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; letter-spacing: 0.04em;
    }

    .card-meta {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-top: 4px;
    }
    .card-timestamp {
      font-family: 'Space Mono', monospace; font-size: 10px;
      color: var(--muted); letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 4px;
    }
    .card-mode-tag {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 0.06em; padding: 2px 8px; border-radius: 4px;
    }
    .tag-summarize { background: rgba(59,158,255,0.1);  color: var(--blue); border: 1px solid rgba(59,158,255,0.2); }
    .tag-simplify  { background: rgba(0,214,143,0.1);   color: var(--success); border: 1px solid rgba(0,214,143,0.2); }
    .tag-translate { background: rgba(245,166,35,0.1);  color: var(--warning); border: 1px solid rgba(245,166,35,0.2); }

    .card-actions {
      flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
    }

    .icon-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 7px; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); font-size: 14px;
      transition: all 0.2s;
    }
    .icon-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
    .icon-btn.fav-btn.active { border-color: var(--warning); color: var(--warning); background: rgba(245,166,35,0.1); }
    .icon-btn.del-btn:hover  { border-color: var(--error); color: var(--error); background: rgba(255,77,109,0.08); }

    /* ══════════════════════════════════════════
       PAGINATION
    ══════════════════════════════════════════ */
    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
      animation: fade-up 0.5s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .page-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      font-family: 'Space Mono', monospace; font-size: 12px;
      color: var(--muted-2); cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover, .page-btn.active {
      border-color: var(--blue); color: var(--blue); background: var(--blue-dim);
    }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ══════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════ */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px;
      font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      z-index: 100; opacity: 0; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ══════════════════════════════════════════
       SCROLLBAR
    ══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div class="bg-orbs"><span></span><span></span></div>
  <div class="toast" id="toast"></div>

  <div class="app-wrapper">

    <!-- ── NAVBAR ── -->
    <nav class="navbar">
      <a class="nav-logo" href="index.html">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm-1-9a1 1 0 0 1 2 0v6a1 1 0 0 1-2 0V5zm6 6a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/></svg>
        </div>
        <span class="nav-logo-text">TALK<span>-AI-</span>TIVE</span>
      </a>
      <div class="nav-right">
        <a class="nav-app-link" href="app.html">← BACK TO APP</a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></button>
        <div class="nav-avatar" id="user-avatar">U</div>
      </div>
    </nav>

    <!-- ── PAGE HEADER ── -->
    <div class="page-header">
      <div class="page-title">
        <div class="page-title-icon">📊</div>
        Dashboard
      </div>
      <p class="page-subtitle">YOUR VOICE QUERY HISTORY & ANALYTICS</p>
    </div>

    <!-- ── MAIN ── -->
    <main class="main">
      <div class="content-wrap">

        <!-- Stats Row -->
        <div class="stats-row" id="stats-row">
          <div class="stat-card">
            <div class="stat-icon">🎙️</div>
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">Total Queries</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🌐</div>
            <div class="stat-value" id="stat-pages">0</div>
            <div class="stat-label">Pages Visited</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <div class="stat-value" id="stat-favs">0</div>
            <div class="stat-label">Favourites</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🔥</div>
            <div class="stat-value" id="stat-mode">—</div>
            <div class="stat-label">Top Mode</div>
          </div>
        </div>

        <!-- Filter Row -->
        <div class="filter-row">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" type="text" id="search-input"
              placeholder="Search queries or URLs…" oninput="filterHistory()" />
          </div>
          <button class="filter-btn active" data-filter="all"     onclick="setFilter(this)">ALL</button>
          <button class="filter-btn"        data-filter="summarize" onclick="setFilter(this)">🔍 SUMMARIZE</button>
          <button class="filter-btn"        data-filter="simplify"  onclick="setFilter(this)">🧒 SIMPLIFY</button>
          <button class="filter-btn"        data-filter="translate" onclick="setFilter(this)">🌍 TRANSLATE</button>
          <button class="filter-btn"        data-filter="favourites" onclick="setFilter(this)">⭐ FAVOURITES</button>
          <button class="clear-all-btn" onclick="confirmClearAll()">🗑 CLEAR ALL</button>
        </div>

        <!-- History List -->
        <div class="history-section">
          <p class="section-label" id="results-label">Recent Queries</p>

          <!-- Empty state -->
          <div class="empty-state" id="empty-state">
            <div class="empty-state-icon">🎙️</div>
            <div class="empty-state-title">No queries yet</div>
            <div class="empty-state-sub">Go back to the app and speak your first command.</div>
          </div>

          <!-- Cards injected here -->
          <div id="history-list"></div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>

      </div>
    </main>
  </div>

  <script>

    /* ═══════════════════════════════════════════
       MOCK DATA
       In Phase 5, replace this with Firestore
       queries: db.collection('queries')
                  .where('userId','==', user.uid)
                  .orderBy('timestamp','desc')
                  .get()
    ═══════════════════════════════════════════ */
    let allHistory = [
      { id:1,  query:"Summarize this page",            url:"https://en.wikipedia.org/wiki/Artificial_intelligence", mode:"summarize", ts: Date.now() - 1000*60*5,    fav:false },
      { id:2,  query:"Explain this like I'm 5",        url:"https://www.bbc.com/news/technology",                  mode:"simplify",  ts: Date.now() - 1000*60*30,   fav:true  },
      { id:3,  query:"Translate this to Hindi",        url:"https://techcrunch.com/2024/01/10/openai-news",        mode:"translate", ts: Date.now() - 1000*60*90,   fav:false },
      { id:4,  query:"Give me the gist of this page",  url:"https://arxiv.org/abs/2401.00001",                     mode:"summarize", ts: Date.now() - 1000*3600*3,  fav:false },
      { id:5,  query:"Simplify this article",          url:"https://www.nature.com/articles/climate-2024",         mode:"simplify",  ts: Date.now() - 1000*3600*6,  fav:true  },
      { id:6,  query:"Translate to Spanish please",    url:"https://www.reuters.com/world/india",                  mode:"translate", ts: Date.now() - 1000*3600*10, fav:false },
      { id:7,  query:"Summarize the key points",       url:"https://github.com/anthropics/anthropic-sdk-python",   mode:"summarize", ts: Date.now() - 1000*3600*24, fav:true  },
      { id:8,  query:"What is this page about",        url:"https://docs.python.org/3/library/asyncio.html",       mode:"simplify",  ts: Date.now() - 1000*3600*30, fav:false },
      { id:9,  query:"Translate this to French",       url:"https://www.lemonde.fr/technologie",                   mode:"translate", ts: Date.now() - 1000*3600*48, fav:false },
      { id:10, query:"Summarize this research paper",  url:"https://arxiv.org/abs/2312.00001",                     mode:"summarize", ts: Date.now() - 1000*3600*72, fav:false },
    ];

    /* ═══════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════ */
    let currentFilter = 'all';
    let currentSearch = '';
    let currentPage   = 1;
    const PER_PAGE    = 6;

    /* ═══════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════ */
    window.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
      renderAll();
      drawBg();
    });

    /* ═══════════════════════════════════════════
       THEME
    ═══════════════════════════════════════════ */
    function toggleTheme() {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    }

    /* ═══════════════════════════════════════════
       FILTER & SEARCH
    ═══════════════════════════════════════════ */
    function setFilter(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      currentPage   = 1;
      renderAll();
    }

    function filterHistory() {
      currentSearch = document.getElementById('search-input').value.toLowerCase().trim();
      currentPage   = 1;
      renderAll();
    }

    function getFiltered() {
      return allHistory.filter(item => {
        const matchFilter =
          currentFilter === 'all'        ? true :
          currentFilter === 'favourites' ? item.fav :
          item.mode === currentFilter;

        const matchSearch =
          !currentSearch ||
          item.query.toLowerCase().includes(currentSearch) ||
          item.url.toLowerCase().includes(currentSearch);

        return matchFilter && matchSearch;
      });
    }

    /* ═══════════════════════════════════════════
       RENDER EVERYTHING
    ═══════════════════════════════════════════ */
    function renderAll() {
      updateStats();
      renderList();
      renderPagination();
    }

    /* ═══════════════════════════════════════════
       STATS
    ═══════════════════════════════════════════ */
    function updateStats() {
      const total = allHistory.length;
      const pages = new Set(allHistory.map(i => new URL(i.url).hostname)).size;
      const favs  = allHistory.filter(i => i.fav).length;

      // Top mode
      const counts = { summarize:0, simplify:0, translate:0 };
      allHistory.forEach(i => counts[i.mode]++);
      const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
      const modeEmoji = { summarize:'🔍', simplify:'🧒', translate:'🌍' };

      animateCount('stat-total', total);
      animateCount('stat-pages', pages);
      animateCount('stat-favs',  favs);
      document.getElementById('stat-mode').textContent = total ? modeEmoji[top[0]] : '—';
    }

    function animateCount(id, target) {
      const el = document.getElementById(id);
      const start = parseInt(el.textContent) || 0;
      const diff  = target - start;
      const steps = 20;
      let i = 0;
      const iv = setInterval(() => {
        i++;
        el.textContent = Math.round(start + diff * (i/steps));
        if (i >= steps) clearInterval(iv);
      }, 20);
    }

    /* ═══════════════════════════════════════════
       RENDER LIST
    ═══════════════════════════════════════════ */
    function renderList() {
      const filtered = getFiltered();
      const list     = document.getElementById('history-list');
      const empty    = document.getElementById('empty-state');
      const label    = document.getElementById('results-label');

      label.textContent = filtered.length
        ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`
        : 'Results';

      if (!filtered.length) {
        list.innerHTML = '';
        empty.classList.add('show');
        return;
      }
      empty.classList.remove('show');

      // Paginate
      const start   = (currentPage - 1) * PER_PAGE;
      const pageItems = filtered.slice(start, start + PER_PAGE);

      list.innerHTML = pageItems.map((item, idx) => `
        <div class="history-card ${item.fav ? 'favorited' : ''}"
             id="card-${item.id}"
             style="animation-delay:${idx * 0.04}s">

          <div class="card-mode-badge">${modeIcon(item.mode)}</div>

          <div class="card-body">
            <div class="card-query">${escHtml(item.query)}</div>
            <div class="card-url">🔗 ${escHtml(item.url)}</div>
            <div class="card-meta">
              <span class="card-timestamp">🕐 ${timeAgo(item.ts)}</span>
              <span class="card-mode-tag tag-${item.mode}">${item.mode.toUpperCase()}</span>
            </div>
          </div>

          <div class="card-actions">
            <button class="icon-btn fav-btn ${item.fav ? 'active' : ''}"
                    onclick="toggleFav(${item.id})"
                    title="${item.fav ? 'Remove favourite' : 'Add to favourites'}">
              ${item.fav ? '⭐' : '☆'}
            </button>
            <button class="icon-btn del-btn"
                    onclick="deleteItem(${item.id})"
                    title="Delete">
              🗑
            </button>
          </div>
        </div>
      `).join('');
    }

    /* ═══════════════════════════════════════════
       PAGINATION
    ═══════════════════════════════════════════ */
    function renderPagination() {
      const filtered   = getFiltered();
      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      const pg         = document.getElementById('pagination');

      if (totalPages <= 1) { pg.innerHTML = ''; return; }

      let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
      for (let i=1; i<=totalPages; i++) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
      pg.innerHTML = html;
    }

    function goPage(n) {
      const filtered   = getFiltered();
      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      if (n < 1 || n > totalPages) return;
      currentPage = n;
      renderList();
      renderPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ═══════════════════════════════════════════
       ACTIONS
    ═══════════════════════════════════════════ */
    function toggleFav(id) {
      const item = allHistory.find(i => i.id === id);
      if (!item) return;
      item.fav = !item.fav;

      // Phase 5: update Firestore
      // db.collection('queries').doc(id).update({ fav: item.fav });

      renderAll();
      showToast(item.fav ? '⭐ Added to favourites!' : '☆ Removed from favourites.');
    }

    function deleteItem(id) {
      const card = document.getElementById('card-' + id);
      if (card) {
        card.style.transition = 'opacity 0.25s, transform 0.25s';
        card.style.opacity    = '0';
        card.style.transform  = 'translateX(20px)';
      }
      setTimeout(() => {
        allHistory = allHistory.filter(i => i.id !== id);

        // Phase 5: delete from Firestore
        // db.collection('queries').doc(id).delete();

        renderAll();
        showToast('🗑 Query deleted.');
      }, 260);
    }

    function confirmClearAll() {
      if (!allHistory.length) { showToast('Nothing to clear.'); return; }
      if (!confirm('Delete ALL query history? This cannot be undone.')) return;
      allHistory = [];

      // Phase 5: batch delete from Firestore
      // const batch = db.batch();
      // snapshot.docs.forEach(doc => batch.delete(doc.ref));
      // batch.commit();

      renderAll();
      showToast('🗑 All history cleared.');
    }

    /* ═══════════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════════ */
    function modeIcon(mode) {
      return { summarize:'🔍', simplify:'🧒', translate:'🌍' }[mode] || '🎙️';
    }

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      const m = Math.floor(diff / 60000);
      const h = Math.floor(diff / 3600000);
      const d = Math.floor(diff / 86400000);
      if (m < 1)  return 'just now';
      if (m < 60) return `${m}m ago`;
      if (h < 24) return `${h}h ago`;
      return `${d}d ago`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ═══════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════ */
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ═══════════════════════════════════════════
       BACKGROUND WAVES
    ═══════════════════════════════════════════ */
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx    = bgCanvas.getContext('2d');
    function resizeBg() { bgCanvas.width = innerWidth; bgCanvas.height = innerHeight; }
    resizeBg(); window.addEventListener('resize', resizeBg);

    let bgT = 0;
    function drawBg() {
      bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
      [[0.15,18,0.0008,0,'#3b9eff',0.04],[0.88,14,0.0011,3,'#00e5ff',0.03]].forEach(([y,amp,spd,ph,col,alpha]) => {
        bgCtx.beginPath();
        bgCtx.moveTo(0, bgCanvas.height*y);
        for (let x=0;x<=bgCanvas.width;x+=4) bgCtx.lineTo(x, bgCanvas.height*y + Math.sin(x*0.005+bgT*spd*1000+ph)*amp);
        bgCtx.strokeStyle=col; bgCtx.lineWidth=1.2; bgCtx.globalAlpha=alpha; bgCtx.stroke(); bgCtx.globalAlpha=1;
      });
      bgT++;
      requestAnimationFrame(drawBg);
    }

  </script>
</body>
</html>
