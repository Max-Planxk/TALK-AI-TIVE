<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TALK-AI-TIVE — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS Variables ─── */
    :root {
      --bg:       #070b14;
      --surface:  #0d1424;
      --border:   rgba(99, 179, 255, 0.15);
      --blue:     #3b9eff;
      --blue-dim: rgba(59, 158, 255, 0.12);
      --cyan:     #00e5ff;
      --text:     #e8f4ff;
      --muted:    #5a7a99;
      --error:    #ff4d6d;
      --glow:     0 0 40px rgba(59, 158, 255, 0.25);
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ─── Animated Background Canvas ─── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ─── Radial gradient overlay ─── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(59,158,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(0,229,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ─── Main Layout ─── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ─── Card ─── */
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(13, 20, 36, 0.85);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(59,158,255,0.05),
        0 24px 60px rgba(0,0,0,0.5),
        var(--glow);
      animation: card-in 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Logo / Header ─── */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .mic-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--blue-dim);
      border: 1px solid rgba(59,158,255,0.3);
      margin-bottom: 16px;
      position: relative;
      animation: pulse-ring 2.4s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59,158,255,0.3); }
      50%       { box-shadow: 0 0 0 10px rgba(59,158,255,0); }
    }

    .mic-icon svg { width: 26px; height: 26px; fill: var(--blue); }

    .logo-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .logo-title span {
      color: var(--blue);
    }

    .logo-tagline {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-top: 6px;
    }

    /* ─── Tab Toggle ─── */
    .tabs {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 9px 0;
      border-radius: 7px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.04em;
    }

    .tab-btn.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 2px 12px rgba(59,158,255,0.4);
    }

    /* ─── Form ─── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 40px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .form-input::placeholder { color: var(--muted); }

    .form-input:focus {
      border-color: var(--blue);
      background: rgba(59,158,255,0.06);
      box-shadow: 0 0 0 3px rgba(59,158,255,0.12);
    }

    /* ─── Error message ─── */
    .error-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 6px;
      display: none;
      font-family: 'Space Mono', monospace;
    }

    .error-msg.visible { display: block; }

    /* ─── Forgot password ─── */
    .forgot {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 20px;
    }

    .forgot a {
      font-size: 12px;
      color: var(--blue);
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .forgot a:hover { opacity: 1; }

    /* ─── Primary Button ─── */
    .btn-primary {
      width: 100%;
      background: var(--blue);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(59,158,255,0.4);
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(59,158,255,0.5);
    }

    .btn-primary:active { transform: translateY(1px); box-shadow: none; }

    .btn-primary.loading .btn-text { visibility: hidden; }
    .btn-primary.loading::before {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Divider ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ─── Google Button ─── */
    .btn-google {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .btn-google:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(99,179,255,0.3);
      transform: translateY(-1px);
    }

    .btn-google svg { width: 18px; height: 18px; }

    /* ─── Footer link ─── */
    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .card-footer a:hover { opacity: 0.8; }

    /* ─── Sign-up extra field ─── */
    #signup-extra { display: none; }
    #signup-extra.visible { display: block; }

    /* ─── Floating particles ─── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: float-up linear infinite;
      opacity: 0;
    }

    @keyframes float-up {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Background canvas for waveform animation -->
  <canvas id="bg-canvas"></canvas>
  <div class="bg-gradient"></div>

  <div class="page">
    <div class="card">

      <!-- Logo -->
      <div class="logo-area">
        <div class="mic-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm-1-9a1 1 0 0 1 2 0v6a1 1 0 0 1-2 0V5zm6 6a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/>
          </svg>
        </div>
        <div class="logo-title">TALK<span>-AI-</span>TIVE</div>
        <div class="logo-tagline">SPEAK. LISTEN. CONQUER.</div>
      </div>

      <!-- Tab Toggle -->
      <div class="tabs" role="tablist">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')" role="tab">Login</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')" role="tab">Sign Up</button>
      </div>

      <!-- Form -->
      <form id="auth-form" onsubmit="handleSubmit(event)" novalidate>

        <!-- Name field (signup only) -->
        <div class="form-group" id="signup-extra">
          <label class="form-label" for="name">Full Name</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="7" r="4"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/>
            </svg>
            <input class="form-input" type="text" id="name" placeholder="Your name" autocomplete="name" />
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <p class="error-msg" id="email-error">Please enter a valid email.</p>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>
          <p class="error-msg" id="password-error">Password must be at least 6 characters.</p>
        </div>

        <!-- Forgot (login only) -->
        <div class="forgot" id="forgot-link">
          <a href="#">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button class="btn-primary" type="submit" id="submit-btn">
          <span class="btn-text" id="btn-label">LOGIN</span>
        </button>

      </form>

      <!-- Divider -->
      <div class="divider"><span>or continue with</span></div>

      <!-- Google -->
      <button class="btn-google" onclick="handleGoogle()">
        <!-- Google logo SVG -->
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Sign in with Google
      </button>

      <!-- Footer -->
      <p class="card-footer" id="card-footer-text">
        Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign Up</a>
      </p>

    </div>
  </div>

  <script>
    /* ─────────────────────────────────────────
       Tab switching
    ───────────────────────────────────────── */
    let currentTab = 'login';

    function switchTab(tab) {
      currentTab = tab;
      const isSignup = tab === 'signup';

      document.getElementById('tab-login').classList.toggle('active', !isSignup);
      document.getElementById('tab-signup').classList.toggle('active', isSignup);

      const extra = document.getElementById('signup-extra');
      extra.classList.toggle('visible', isSignup);

      document.getElementById('forgot-link').style.display = isSignup ? 'none' : 'block';
      document.getElementById('btn-label').textContent = isSignup ? 'CREATE ACCOUNT' : 'LOGIN';

      document.getElementById('card-footer-text').innerHTML = isSignup
        ? 'Already have an account? <a href="#" onclick="switchTab(\'login\'); return false;">Login</a>'
        : "Don't have an account? <a href=\"#\" onclick=\"switchTab('signup'); return false;\">Sign Up</a>";

      // Clear errors
      document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('visible'));
    }

    /* ─────────────────────────────────────────
       Form submit
    ───────────────────────────────────────── */
    function handleSubmit(e) {
      e.preventDefault();
      if (!validateForm()) return;

      const btn = document.getElementById('submit-btn');
      btn.classList.add('loading');

      // Simulate async call — replace with Firebase Auth later
      setTimeout(() => {
        btn.classList.remove('loading');
        // Redirect to main app
        window.location.href = 'app.html';
      }, 1500);
    }

    function validateForm() {
      let valid = true;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const emailErr = document.getElementById('email-error');
      const passErr = document.getElementById('password-error');

      emailErr.classList.remove('visible');
      passErr.classList.remove('visible');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailErr.classList.add('visible');
        valid = false;
      }
      if (password.length < 6) {
        passErr.classList.add('visible');
        valid = false;
      }
      return valid;
    }

    function handleGoogle() {
      // Wire up Firebase Google sign-in here in Phase 5
      alert('Google Sign-In: wire up Firebase Auth in Phase 5!');
    }

    /* ─────────────────────────────────────────
       Background canvas — ambient waveform
    ───────────────────────────────────────── */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const waves = [
      { y: 0.35, amp: 28, speed: 0.0008, phase: 0,   alpha: 0.06, color: '#3b9eff' },
      { y: 0.5,  amp: 18, speed: 0.0012, phase: 2,   alpha: 0.04, color: '#00e5ff' },
      { y: 0.65, amp: 22, speed: 0.001,  phase: 4.5, alpha: 0.05, color: '#3b9eff' },
    ];

    let t = 0;
    function drawWaves() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      waves.forEach(w => {
        ctx.beginPath();
        ctx.moveTo(0, canvas.height * w.y);
        for (let x = 0; x <= canvas.width; x += 3) {
          const y = canvas.height * w.y + Math.sin(x * 0.006 + t * w.speed * 1000 + w.phase) * w.amp;
          ctx.lineTo(x, y);
        }
        ctx.strokeStyle = w.color;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = w.alpha;
        ctx.stroke();
        ctx.globalAlpha = 1;
      });
      t++;
      requestAnimationFrame(drawWaves);
    }
    drawWaves();

    /* ─────────────────────────────────────────
       Floating particles
    ───────────────────────────────────────── */
    function spawnParticle() {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      const x    = Math.random() * 100;
      const dur  = Math.random() * 10 + 8;
      const delay = Math.random() * 5;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${x}vw; bottom:-10px;
        background:${Math.random() > 0.5 ? '#3b9eff' : '#00e5ff'};
        animation-duration:${dur}s;
        animation-delay:${delay}s;
        opacity:0;
        filter: blur(${Math.random() > 0.5 ? '1px' : '0px'});
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), (dur + delay) * 1000 + 500);
    }

    for (let i = 0; i < 18; i++) spawnParticle();
    setInterval(spawnParticle, 1200);
  </script>

</body>
</html>
