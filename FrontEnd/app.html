<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TALK-AI-TIVE — App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #070b14;
      --surface:     #0d1424;
      --surface-2:   #111b2e;
      --border:      rgba(99,179,255,0.14);
      --blue:        #3b9eff;
      --blue-dim:    rgba(59,158,255,0.12);
      --blue-glow:   rgba(59,158,255,0.35);
      --cyan:        #00e5ff;
      --text:        #e8f4ff;
      --muted:       #4d6b88;
      --muted-2:     #7a9ab8;
      --success:     #00d68f;
      --error:       #ff4d6d;
      --bg-light:       #f5ede0;
      --surface-light:  #fdf5eb;
      --border-light:   rgba(200,130,50,0.22);
      --text-light:     #2d1a06;
      --muted-light:    #a0784a;
    }

    body.light {
      --bg:        #f5ede0;
      --surface:   #fdf5eb;
      --surface-2: #f0e2cc;
      --border:    rgba(200,130,50,0.22);
      --text:      #2d1a06;
      --muted:     #a0784a;
      --muted-2:   #7a5530;
      --blue:      #d4790a;
      --blue-dim:  rgba(212,121,10,0.12);
      --blue-glow: rgba(212,121,10,0.35);
      --cyan:      #c05c00;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; scroll-behavior: smooth; }
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
    }

    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    body.light .bg-orbs span:nth-child(1) { background: #e8820a; }
    body.light .bg-orbs span:nth-child(2) { background: #f5b942; }
    body.light .bg-orbs span:nth-child(3) { background: #d46b0a; }
    .bg-orbs span {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.06;
      animation: orb-drift ease-in-out infinite alternate;
    }
    .bg-orbs span:nth-child(1) { width: 500px; height: 500px; background: var(--blue); top: -100px; left: -80px; animation-duration: 14s; }
    .bg-orbs span:nth-child(2) { width: 400px; height: 400px; background: var(--cyan); bottom: -60px; right: -60px; animation-duration: 18s; animation-delay: -6s; }
    .bg-orbs span:nth-child(3) { width: 300px; height: 300px; background: var(--blue); top: 40%; left: 50%; animation-duration: 22s; animation-delay: -10s; }
    @keyframes orb-drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    .app-wrapper { position: relative; z-index: 2; display: flex; flex-direction: column; min-height: 100vh; }

    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,11,20,0.7);
      backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10;
      transition: background 0.4s, border-color 0.4s;
    }
    body.light .navbar { background: rgba(245,237,224,0.88); }

    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--blue-dim); border: 1px solid rgba(59,158,255,0.3); display: flex; align-items: center; justify-content: center; }
    .nav-logo-icon svg { width: 16px; height: 16px; fill: var(--blue); }
    .nav-logo-text { font-size: 16px; font-weight: 800; letter-spacing: 0.05em; color: var(--text); }
    .nav-logo-text span { color: var(--blue); }

    .nav-right { display: flex; align-items: center; gap: 12px; }

    .theme-toggle { width: 44px; height: 24px; border-radius: 99px; background: var(--surface-2); border: 1px solid var(--border); cursor: pointer; position: relative; transition: background 0.3s; flex-shrink: 0; }
    .theme-toggle::before { content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: var(--blue); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 0 6px var(--blue-glow); }
    body.light .theme-toggle::before { transform: translateX(20px); background: #f5a623; box-shadow: 0 0 6px rgba(245,166,35,0.5); }

    .nav-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; flex-shrink: 0; box-shadow: 0 0 12px rgba(59,158,255,0.3); }

    .nav-dashboard-link { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em; color: var(--muted-2); text-decoration: none; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); transition: color 0.2s, border-color 0.2s, background 0.2s; }
    .nav-dashboard-link:hover { color: var(--blue); border-color: rgba(59,158,255,0.35); background: var(--blue-dim); }

    .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 60px; gap: 28px; }

    .url-bar { width: 100%; max-width: 680px; display: flex; gap: 10px; animation: slide-down 0.5s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes slide-down { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }

    .url-input-wrap { flex: 1; position: relative; }
    .url-prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); pointer-events: none; white-space: nowrap; }
    .url-input { width: 100%; height: 48px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0 48px 0 44px; font-family: 'Syne', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,158,255,0.12); background: rgba(59,158,255,0.04); }

    .url-clear-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); line-height: 1; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .url-clear-btn.visible { opacity: 1; pointer-events: all; }
    .url-clear-btn:hover { color: var(--text); }

    .url-submit-btn { height: 48px; padding: 0 20px; background: var(--blue); border: none; border-radius: 12px; color: #fff; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 16px rgba(59,158,255,0.35); white-space: nowrap; }
    .url-submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,158,255,0.45); }
    .url-submit-btn:active { transform: translateY(1px); box-shadow: none; }
    .url-submit-btn svg { width: 16px; height: 16px; fill: #fff; }

    .url-status { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.06em; padding: 4px 10px; border-radius: 6px; display: none; align-items: center; gap: 6px; align-self: flex-start; margin-left: 4px; white-space: nowrap; }
    .url-status.show { display: flex; }
    .url-status.loading { color: var(--muted-2); background: var(--surface); border: 1px solid var(--border); }
    .url-status.ok      { color: var(--success); background: rgba(0,214,143,0.08); border: 1px solid rgba(0,214,143,0.2); }
    .url-status.err     { color: var(--error);   background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .status-dot.pulse { animation: blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .mode-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; animation: slide-down 0.55s 0.05s cubic-bezier(0.22,1,0.36,1) both; }

    .mode-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 8px 18px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted-2); cursor: pointer; display: flex; align-items: center; gap: 7px; transition: all 0.2s; letter-spacing: 0.03em; }
    .mode-btn:hover { border-color: rgba(59,158,255,0.35); color: var(--blue); background: var(--blue-dim); }
    .mode-btn.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 14px rgba(59,158,255,0.2); }
    .mode-btn .mode-icon { font-size: 15px; }

    .mic-section { display: flex; flex-direction: column; align-items: center; gap: 20px; animation: fade-up 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes fade-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .mic-ring-outer { position: relative; width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; }
    .mic-ring-outer::before, .mic-ring-outer::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--blue); opacity: 0; transition: opacity 0.3s; }
    .mic-ring-outer.recording::before { animation: ripple 1.6s ease-out infinite; }
    .mic-ring-outer.recording::after  { animation: ripple 1.6s 0.5s ease-out infinite; }
    @keyframes ripple { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.9); opacity: 0; } }

    .mic-btn { width: 100px; height: 100px; border-radius: 50%; background: var(--blue-dim); border: 2px solid rgba(59,158,255,0.35); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; transition: transform 0.2s, box-shadow 0.3s, background 0.3s, border-color 0.3s; box-shadow: 0 0 30px rgba(59,158,255,0.2), inset 0 0 20px rgba(59,158,255,0.05); }
    .mic-btn:hover { transform: scale(1.06); box-shadow: 0 0 50px rgba(59,158,255,0.35), inset 0 0 30px rgba(59,158,255,0.08); }
    .mic-btn:active { transform: scale(0.96); }
    .mic-btn.recording { background: rgba(59,158,255,0.22); border-color: var(--blue); box-shadow: 0 0 60px rgba(59,158,255,0.5), inset 0 0 30px rgba(59,158,255,0.15); animation: mic-pulse 1.2s ease-in-out infinite; }
    @keyframes mic-pulse { 0%,100% { box-shadow: 0 0 40px rgba(59,158,255,0.4), inset 0 0 20px rgba(59,158,255,0.1); } 50% { box-shadow: 0 0 80px rgba(59,158,255,0.65), inset 0 0 40px rgba(59,158,255,0.2); } }
    .mic-btn svg { width: 42px; height: 42px; fill: var(--blue); transition: fill 0.2s, transform 0.2s; filter: drop-shadow(0 0 8px rgba(59,158,255,0.4)); }
    .mic-btn.recording svg { fill: #fff; }

    .mic-label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; transition: color 0.3s; }
    .mic-label.recording { color: var(--blue); }

    .waveform-wrap { width: 100%; max-width: 500px; height: 48px; position: relative; }
    #waveform-canvas { width: 100%; height: 100%; display: block; }
    .waveform-idle-bars { display: flex; align-items: center; justify-content: center; gap: 4px; height: 100%; position: absolute; inset: 0; }
    .waveform-idle-bars span { display: block; width: 3px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
    .waveform-idle-bars span:nth-child(odd)  { height: 8px;  animation: idle-bob 2s ease-in-out infinite alternate; }
    .waveform-idle-bars span:nth-child(even) { height: 14px; animation: idle-bob 2s 0.3s ease-in-out infinite alternate; }
    .waveform-idle-bars span:nth-child(3n)   { height: 6px; }
    .waveform-idle-bars span:nth-child(5)    { height: 20px; animation-delay: 0.6s; }
    .waveform-idle-bars span:nth-child(9)    { height: 22px; animation-delay: 0.9s; }
    .waveform-idle-bars span:nth-child(13)   { height: 16px; animation-delay: 1.1s; }
    @keyframes idle-bob { from { transform: scaleY(1); } to { transform: scaleY(1.8); } }

    .transcript-area { width: 100%; max-width: 680px; animation: fade-up 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both; }
    .transcript-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; padding-left: 2px; }
    .transcript-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; min-height: 52px; font-size: 15px; line-height: 1.6; color: var(--muted-2); font-style: italic; transition: border-color 0.3s, color 0.3s; position: relative; }
    .transcript-box.has-text { color: var(--text); font-style: normal; border-color: rgba(59,158,255,0.25); }
    .transcript-cursor { display: inline-block; width: 2px; height: 1em; background: var(--blue); margin-left: 2px; vertical-align: middle; animation: cursor-blink 0.8s step-end infinite; opacity: 0; }
    .transcript-cursor.visible { opacity: 1; }
    @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .response-area { width: 100%; max-width: 680px; animation: fade-up 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both; }
    .response-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding-left: 2px; }
    .response-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .ai-badge { background: var(--blue-dim); border: 1px solid rgba(59,158,255,0.25); border-radius: 4px; padding: 2px 6px; font-size: 10px; color: var(--blue); font-family: 'Space Mono', monospace; }
    .response-actions { display: flex; gap: 8px; }
    .response-action-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; letter-spacing: 0.06em; }
    .response-action-btn:hover { color: var(--blue); border-color: rgba(59,158,255,0.3); background: var(--blue-dim); }
    .response-action-btn svg { width: 11px; height: 11px; fill: currentColor; }

    .response-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 20px; min-height: 100px; font-size: 15px; line-height: 1.75; color: var(--muted-2); font-style: italic; position: relative; transition: border-color 0.3s; overflow: hidden; }
    .response-box.has-response { color: var(--text); font-style: normal; border-color: rgba(59,158,255,0.2); }
    .response-box.thinking { border-color: rgba(59,158,255,0.25); }

    .thinking-shimmer { display: none; flex-direction: column; gap: 10px; }
    .thinking-shimmer.show { display: flex; }
    .shimmer-line { height: 12px; border-radius: 6px; background: linear-gradient(90deg, var(--surface-2) 0%, rgba(59,158,255,0.12) 40%, var(--surface-2) 80%); background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite; }
    .shimmer-line:nth-child(1) { width: 90%; }
    .shimmer-line:nth-child(2) { width: 75%; animation-delay: 0.1s; }
    .shimmer-line:nth-child(3) { width: 55%; animation-delay: 0.2s; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #ai-response-text { display: none; }
    #ai-response-text.show { display: block; }

    .tts-btn { display: none; align-items: center; gap: 6px; background: none; border: 1px solid rgba(0,229,255,0.25); border-radius: 6px; padding: 5px 12px; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--cyan); cursor: pointer; transition: all 0.2s; letter-spacing: 0.06em; margin-top: 14px; }
    .tts-btn.show { display: inline-flex; }
    .tts-btn:hover { background: rgba(0,229,255,0.08); border-color: var(--cyan); }
    .tts-btn svg { width: 12px; height: 12px; fill: currentColor; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; z-index: 100; opacity: 0; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div class="bg-orbs"><span></span><span></span><span></span></div>
  <div class="toast" id="toast"></div>

  <div class="app-wrapper">

    <nav class="navbar">
      <a class="nav-logo" href="index.html">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm-1-9a1 1 0 0 1 2 0v6a1 1 0 0 1-2 0V5zm6 6a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/></svg>
        </div>
        <span class="nav-logo-text">TALK<span>-AI-</span>TIVE</span>
      </a>
      <div class="nav-right">
        <a class="nav-dashboard-link" href="dashboard.html">DASHBOARD →</a>
        <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode" onclick="toggleTheme()"></button>
        <div class="nav-avatar" id="user-avatar">U</div>
      </div>
    </nav>

    <main class="main">

      <!-- URL Bar -->
      <div style="width:100%;max-width:680px;display:flex;flex-direction:column;gap:8px;">
        <div class="url-bar">
          <div class="url-input-wrap">
            <span class="url-prefix">🔗</span>
            <input class="url-input" type="url" id="url-input" placeholder="Paste any URL — e.g. https://en.wikipedia.org/wiki/AI" autocomplete="off" spellcheck="false" />
            <button class="url-clear-btn" id="url-clear" onclick="clearUrl()" title="Clear">✕</button>
          </div>
          <button class="url-submit-btn" onclick="loadUrl()">
            <svg viewBox="0 0 24 24"><path d="M9.5 15.5l5-5-5-5"/></svg>
            LOAD
          </button>
        </div>
        <div class="url-status" id="url-status">
          <span class="status-dot pulse" id="status-dot"></span>
          <span id="status-text">Fetching page…</span>
        </div>
      </div>

      <!-- Mode Selector -->
      <div class="mode-row" id="mode-row">
        <button class="mode-btn active" data-mode="summarize" onclick="selectMode(this)"><span class="mode-icon">🔍</span> Summarize</button>
        <button class="mode-btn" data-mode="simplify" onclick="selectMode(this)"><span class="mode-icon">🧒</span> Simplify</button>
        <button class="mode-btn" data-mode="translate" onclick="selectMode(this)"><span class="mode-icon">🌍</span> Translate</button>
      </div>

      <!-- Mic Button -->
      <div class="mic-section">
        <div class="mic-ring-outer" id="mic-ring">
          <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Click to speak">
            <svg id="mic-icon" viewBox="0 0 24 24">
              <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm-1-9a1 1 0 0 1 2 0v6a1 1 0 0 1-2 0V5zm6 6a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/>
            </svg>
          </button>
        </div>
        <span class="mic-label" id="mic-label">CLICK TO SPEAK</span>
      </div>

      <!-- Waveform -->
      <div class="waveform-wrap">
        <div class="waveform-idle-bars" id="idle-bars">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span>
        </div>
        <canvas id="waveform-canvas" style="display:none;"></canvas>
      </div>

      <!-- Transcript -->
      <div class="transcript-area">
        <p class="transcript-label">You said</p>
        <div class="transcript-box" id="transcript-box">
          <span id="transcript-text">Speak a command after clicking the mic…</span>
          <span class="transcript-cursor" id="transcript-cursor"></span>
        </div>
      </div>

      <!-- AI Response -->
      <div class="response-area">
        <div class="response-header">
          <div class="response-label">
            <span class="ai-badge">Groq AI</span>
            AI Response
          </div>
          <div class="response-actions">
            <button class="response-action-btn" onclick="copyResponse()" title="Copy response">
              <svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
              COPY
            </button>
            <button class="response-action-btn" onclick="clearAll()" title="Clear all">
              <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
              CLEAR
            </button>
          </div>
        </div>

        <div class="response-box" id="response-box">
          <div class="thinking-shimmer" id="thinking-shimmer">
            <div class="shimmer-line"></div>
            <div class="shimmer-line"></div>
            <div class="shimmer-line"></div>
          </div>
          <div id="ai-response-text">AI response will appear here with a typewriter effect…</div>
        </div>

        <button class="tts-btn" id="tts-btn" onclick="speakResponse()">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/></svg>
          SPEAK RESPONSE
        </button>
      </div>

    </main>
  </div>

  <script>
    let isRecording   = false;
    let currentMode   = 'summarize';
    let currentUrl    = '';
    let aiResponseRaw = '';
    let recognition   = null;
    let audioCtx      = null;
    let analyser      = null;
    let micStream     = null;
    let waveAnimId    = null;

    /* THEME */
    function toggleTheme() {
      document.body.classList.toggle('light');
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    }
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

    /* BACKGROUND */
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx    = bgCanvas.getContext('2d');
    function resizeBg() { bgCanvas.width = innerWidth; bgCanvas.height = innerHeight; }
    resizeBg(); window.addEventListener('resize', resizeBg);
    const bgWaves = [
      { y:0.2, amp:20, speed:0.0009, phase:0,   alpha:0.04, color:'#3b9eff' },
      { y:0.8, amp:16, speed:0.0013, phase:2.5, alpha:0.03, color:'#00e5ff' },
    ];
    let bgT = 0;
    function drawBg() {
      bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
      bgWaves.forEach(w => {
        bgCtx.beginPath();
        bgCtx.moveTo(0, bgCanvas.height * w.y);
        for (let x=0; x<=bgCanvas.width; x+=4) {
          const y = bgCanvas.height * w.y + Math.sin(x*0.005 + bgT*w.speed*1000 + w.phase) * w.amp;
          bgCtx.lineTo(x, y);
        }
        bgCtx.strokeStyle = w.color;
        bgCtx.lineWidth = 1.2;
        bgCtx.globalAlpha = w.alpha;
        bgCtx.stroke();
        bgCtx.globalAlpha = 1;
      });
      bgT++;
      requestAnimationFrame(drawBg);
    }
    drawBg();

    /* URL BAR */
    const urlInput = document.getElementById('url-input');
    urlInput.addEventListener('input', () => {
      document.getElementById('url-clear').classList.toggle('visible', urlInput.value.length > 0);
    });

    function clearUrl() {
      urlInput.value = '';
      document.getElementById('url-clear').classList.remove('visible');
      setUrlStatus('', '');
      urlInput.focus();
    }

    function setUrlStatus(state, msg) {
      const el  = document.getElementById('url-status');
      const dot = document.getElementById('status-dot');
      const txt = document.getElementById('status-text');
      el.className = 'url-status';
      if (!state) return;
      el.classList.add('show', state);
      dot.className = 'status-dot' + (state === 'loading' ? ' pulse' : '');
      txt.textContent = msg;
    }

    // ✅ PHASE 4 — loadUrl hits real backend
    function loadUrl() {
      const val = urlInput.value.trim();
      if (!val) { showToast('⚠️ Paste a URL first.'); return; }
      let url = val;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      currentUrl = url;
      setUrlStatus('loading', 'Fetching page…');

      fetch('http://localhost:5000/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url, userCommand: 'summarize', mode: 'summarize' })
      })
      .then(r => r.json())
      .then(() => {
        setUrlStatus('ok', 'Page loaded ✓');
        showToast('✅ URL loaded! Now click the mic.');
      })
      .catch(() => setUrlStatus('err', 'Could not load page — is server running?'));
    }

    /* MODE SELECTOR */
    function selectMode(btn) {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
    }

    /* MIC */
    function toggleMic() {
      if (!currentUrl) { showToast('⚠️ Load a URL first!'); return; }
      isRecording ? stopRecording() : startRecording();
    }

    function startRecording() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) { showToast('❌ Try Chrome — Speech API not supported here.'); return; }

      isRecording = true;
      setMicState(true);

      recognition = new SpeechRecognition();
      recognition.continuous     = false;
      recognition.interimResults = true;
      recognition.lang           = 'en-US';

      recognition.onstart = () => setTranscript('', true);

      recognition.onresult = (event) => {
        let interim = '', final = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const t = event.results[i][0].transcript;
          event.results[i].isFinal ? final += t : interim += t;
        }
        setTranscript(final || interim, !final);
      };

      recognition.onend = () => {
        isRecording = false;
        setMicState(false);
        stopWaveform();
        const text = document.getElementById('transcript-text').textContent;
        if (text && text !== 'Speak a command after clicking the mic…') {
          sendToAI(text);
        }
      };

      recognition.onerror = (e) => {
        isRecording = false;
        setMicState(false);
        stopWaveform();
        if (e.error !== 'aborted') showToast('Mic error: ' + e.error);
      };

      recognition.start();
      startWaveform();
    }

    function stopRecording() {
      if (recognition) recognition.stop();
      isRecording = false;
      setMicState(false);
      stopWaveform();
    }

    function setMicState(active) {
      const btn   = document.getElementById('mic-btn');
      const ring  = document.getElementById('mic-ring');
      const label = document.getElementById('mic-label');
      btn.classList.toggle('recording', active);
      ring.classList.toggle('recording', active);
      label.classList.toggle('recording', active);
      label.textContent = active ? 'LISTENING…' : 'CLICK TO SPEAK';
    }

    /* WAVEFORM */
    function startWaveform() {
      document.getElementById('idle-bars').style.display = 'none';
      document.getElementById('waveform-canvas').style.display = 'block';
      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        micStream = stream;
        audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
        analyser  = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        drawWaveform();
      }).catch(() => drawFakeWaveform());
    }

    function stopWaveform() {
      if (waveAnimId) cancelAnimationFrame(waveAnimId);
      if (micStream)  micStream.getTracks().forEach(t => t.stop());
      if (audioCtx)   audioCtx.close();
      micStream = audioCtx = analyser = null;
      document.getElementById('idle-bars').style.display = 'flex';
      document.getElementById('waveform-canvas').style.display = 'none';
    }

    function drawWaveform() {
      const cvs = document.getElementById('waveform-canvas');
      cvs.width = cvs.clientWidth; cvs.height = cvs.clientHeight;
      const c   = cvs.getContext('2d');
      const buf = new Uint8Array(analyser.frequencyBinCount);
      function frame() {
        analyser.getByteFrequencyData(buf);
        c.clearRect(0, 0, cvs.width, cvs.height);
        const bars = buf.length, bw = cvs.width / bars, cx = cvs.width / 2;
        buf.forEach((val, i) => {
          const h = (val / 255) * cvs.height * 0.85 + 3;
          const x = i * bw + bw / 2;
          const alpha = 1 - Math.abs(x - cx) / cx * 0.5;
          const grad = c.createLinearGradient(x, cvs.height/2 - h/2, x, cvs.height/2 + h/2);
          grad.addColorStop(0,   `rgba(0,229,255,${alpha * 0.9})`);
          grad.addColorStop(0.5, `rgba(59,158,255,${alpha})`);
          grad.addColorStop(1,   `rgba(0,229,255,${alpha * 0.9})`);
          c.fillStyle = grad;
          c.beginPath();
          c.roundRect(x - bw * 0.3, cvs.height/2 - h/2, bw * 0.6, h, 2);
          c.fill();
        });
        waveAnimId = requestAnimationFrame(frame);
      }
      frame();
    }

    function drawFakeWaveform() {
      const cvs = document.getElementById('waveform-canvas');
      cvs.width = cvs.clientWidth; cvs.height = cvs.clientHeight;
      const c = cvs.getContext('2d');
      let t = 0;
      function frame() {
        c.clearRect(0, 0, cvs.width, cvs.height);
        const bars = 30, bw = cvs.width / bars;
        for (let i = 0; i < bars; i++) {
          const h = (Math.sin(i * 0.5 + t) * 0.4 + 0.5) * cvs.height * 0.7 + 5;
          const x = i * bw + bw / 2;
          c.fillStyle = `rgba(59,158,255,0.6)`;
          c.beginPath();
          c.roundRect(x - bw*0.3, cvs.height/2 - h/2, bw*0.6, h, 2);
          c.fill();
        }
        t += 0.12;
        waveAnimId = requestAnimationFrame(frame);
      }
      frame();
    }

    /* TRANSCRIPT */
    function setTranscript(text, showCursor) {
      const box    = document.getElementById('transcript-box');
      const txtEl  = document.getElementById('transcript-text');
      const cursor = document.getElementById('transcript-cursor');
      txtEl.textContent = text || '';
      box.classList.toggle('has-text', !!text);
      cursor.classList.toggle('visible', showCursor);
    }

    // ✅ PHASE 5 — Save query + response to Firestore via backend
    function saveToHistory(userText, aiReply) {
      const userId = localStorage.getItem('talkaitiveUserId') || 'anonymous';
      fetch('http://localhost:5000/api/history', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId:   userId,
          url:      currentUrl,
          query:    userText,
          response: aiReply
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          console.log('✅ Query saved to Firestore history');
        }
      })
      .catch(err => {
        // Silent fail — don't bother the user if history save fails
        console.warn('⚠️ History save failed (non-critical):', err);
      });
    }

    // ✅ PHASE 4 + 5 — sendToAI hits backend, then saves to history
    function sendToAI(userText) {
      document.getElementById('transcript-cursor').classList.remove('visible');
      showThinking();

      fetch('http://localhost:5000/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: currentUrl, userCommand: userText, mode: currentMode })
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          typewriterResponse('❌ ' + data.error);
        } else {
          typewriterResponse(data.reply);
          saveToHistory(userText, data.reply); // ✅ PHASE 5 — save to Firestore
        }
      })
      .catch(() => typewriterResponse('❌ Could not reach backend. Make sure node server.js is running.'));
    }

    function showThinking() {
      const box = document.getElementById('response-box');
      box.classList.add('thinking');
      document.getElementById('thinking-shimmer').classList.add('show');
      document.getElementById('ai-response-text').classList.remove('show');
      document.getElementById('tts-btn').classList.remove('show');
    }

    function typewriterResponse(text) {
      aiResponseRaw = text;
      document.getElementById('thinking-shimmer').classList.remove('show');
      const box = document.getElementById('response-box');
      const el  = document.getElementById('ai-response-text');
      box.classList.remove('thinking');
      box.classList.add('has-response');
      el.classList.add('show');
      el.textContent = '';
      let i = 0;
      function type() {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(type, 18);
        } else {
          document.getElementById('tts-btn').classList.add('show');
        }
      }
      type();
    }

    /* TTS */
    function speakResponse() {
      if (!aiResponseRaw) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(aiResponseRaw);
      utt.rate = 1; utt.pitch = 1;
      window.speechSynthesis.speak(utt);
      showToast('🔊 Speaking response…');
    }

    /* COPY & CLEAR */
    function copyResponse() {
      if (!aiResponseRaw) { showToast('Nothing to copy yet.'); return; }
      navigator.clipboard.writeText(aiResponseRaw)
        .then(() => showToast('✅ Copied to clipboard!'))
        .catch(() => showToast('Could not copy.'));
    }

    function clearAll() {
      setTranscript('Speak a command after clicking the mic…', false);
      document.getElementById('transcript-box').classList.remove('has-text');
      document.getElementById('response-box').classList.remove('has-response', 'thinking');
      document.getElementById('thinking-shimmer').classList.remove('show');
      document.getElementById('ai-response-text').classList.remove('show');
      document.getElementById('ai-response-text').textContent = 'AI response will appear here with a typewriter effect…';
      document.getElementById('tts-btn').classList.remove('show');
      aiResponseRaw = '';
    }

    /* TOAST */
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ✅ PHASE 5 — Show logged-in user's initial in avatar
    const savedUserId = localStorage.getItem('talkaitiveUserId');
    const savedEmail  = localStorage.getItem('talkaitiveUserEmail');
    if (savedEmail) {
      document.getElementById('user-avatar').textContent = savedEmail[0].toUpperCase();
    } else {
      document.getElementById('user-avatar').textContent = 'U';
    }
  </script>
</body>
</html>
